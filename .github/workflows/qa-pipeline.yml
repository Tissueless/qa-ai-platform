name: QA Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  qa:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Install Browsers
        run: npx playwright install --with-deps

      - name: Run QA Pipeline
        run: npm run qa

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: reports/

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/